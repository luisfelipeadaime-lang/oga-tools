<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearSky Admin</title>
<link rel="stylesheet" href="pablo-system.css">
<style>
body{background:var(--bg0,#030810);color:var(--text0,#e8eef8);font-family:'DM Sans',system-ui,sans-serif;font-size:13px;margin:0;padding:0}
:root{--bg0:#030810;--bg1:#080f1e;--bg2:#0d1628;--bg3:#111d35;--bg4:#16243f;--border:rgba(99,130,191,0.12);--border-hi:rgba(99,130,191,0.22);--text0:#e8eef8;--text1:#b8c8e4;--text2:#7a94b8;--text3:#4a6080;--teal:#2dd4bf;--teal-dim:rgba(45,212,191,0.10);--amber:#fbbf24;--red:#f87171;--green:#34d399}
.app{max-width:800px;margin:0 auto;padding:24px}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.topbar h1{font-size:16px;font-weight:700;margin:0}
.topbar .version{font-size:10px;color:var(--text3);font-family:monospace}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.auth-form{display:flex;gap:8px;align-items:center}
.auth-form input{background:var(--bg0);border:1px solid var(--border-hi);border-radius:6px;padding:8px 12px;color:var(--text0);font-family:inherit;font-size:13px;flex:1;outline:none}
.auth-form input:focus{border-color:var(--teal)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-teal{background:var(--teal);color:var(--bg0)}.btn-teal:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border-hi);color:var(--text1)}.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.85}
.status{margin-top:8px;font-size:11px;padding:6px 10px;border-radius:6px}
.status.ok{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.status.err{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
table{width:100%;border-collapse:collapse;margin-top:8px}
th{text-align:left;padding:6px 8px;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:8px;border-bottom:1px solid rgba(99,130,191,.06);font-size:12px;color:var(--text1)}
td:first-child{font-family:monospace;color:var(--teal)}
.badge{display:inline-block;font-size:8.5px;padding:2px 6px;border-radius:99px;background:var(--teal);color:var(--bg0);font-weight:600}
.hidden{display:none}
input[type="text"].ids{background:var(--bg0);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text0);font-family:monospace;font-size:12px;width:100%;outline:none;margin-top:6px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>ClearSky Admin</h1>
    <span class="version">v79m</span>
  </div>

  <div class="card" id="authCard">
    <div class="card-title">Authentication</div>
    <div class="auth-form">
      <input type="password" id="pwd" placeholder="Admin password" onkeydown="if(event.key==='Enter')authenticate()">
      <button class="btn btn-teal" onclick="authenticate()">Login</button>
    </div>
    <div id="authStatus"></div>
  </div>

  <div id="adminContent" class="hidden">
    <div class="card">
      <div class="card-title">ClearSky Portfolio Projects</div>
      <div id="projectList">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Add Projects to Portfolio</div>
      <input type="text" class="ids" id="addIds" placeholder="Project IDs (comma-separated, e.g. 985, 1477, 2576)">
      <div style="margin-top:8px;display:flex;gap:8px">
        <button class="btn btn-teal" onclick="addProjects()">Add to portfolio</button>
      </div>
      <div id="addStatus"></div>
    </div>

    <div class="card">
      <div class="card-title">Remove Projects from Portfolio</div>
      <input type="text" class="ids" id="removeIds" placeholder="Project IDs (comma-separated)">
      <div style="margin-top:8px;display:flex;gap:8px">
        <button class="btn btn-red" onclick="removeProjects()">Remove from portfolio</button>
      </div>
      <div id="removeStatus"></div>
    </div>
  </div>
</div>

<script>
var API='https://api-tools.oga.earth';
var PASSWORD='';

function authenticate(){
  PASSWORD=document.getElementById('pwd').value;
  fetch(API+'/api/primitives/vcu/admin/clearsky-project',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:PASSWORD,action:'list'})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.error){
      document.getElementById('authStatus').innerHTML='<div class="status err">'+d.error+'</div>';
      return;
    }
    document.getElementById('authCard').classList.add('hidden');
    document.getElementById('adminContent').classList.remove('hidden');
    renderProjects(d.projects||[]);
  })
  .catch(function(e){
    document.getElementById('authStatus').innerHTML='<div class="status err">'+e.message+'</div>';
  });
}

function renderProjects(projects){
  if(!projects.length){
    document.getElementById('projectList').innerHTML='<div style="color:var(--text3)">No projects in portfolio</div>';
    return;
  }
  var html='<table><thead><tr><th>ID</th><th>Name</th><th>Country</th><th>Methodology</th><th>Status</th></tr></thead><tbody>';
  projects.forEach(function(p){
    html+='<tr><td>'+p.id+'</td><td>'+esc(p.name||'')+'</td><td>'+esc(p.country||'')+'</td><td>'+esc(p.methodology||'')+'</td><td><span class="badge">'+esc(p.status||'')+'</span></td></tr>';
  });
  html+='</tbody></table>';
  document.getElementById('projectList').innerHTML=html;
}

function addProjects(){
  var ids=document.getElementById('addIds').value.split(',').map(function(s){return parseInt(s.trim());}).filter(function(n){return n>0;});
  if(!ids.length){document.getElementById('addStatus').innerHTML='<div class="status err">Enter valid project IDs</div>';return;}
  fetch(API+'/api/primitives/vcu/admin/clearsky-project',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:PASSWORD,action:'add',project_ids:ids})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.error){document.getElementById('addStatus').innerHTML='<div class="status err">'+d.error+'</div>';return;}
    document.getElementById('addStatus').innerHTML='<div class="status ok">Added '+d.count+' projects</div>';
    document.getElementById('addIds').value='';
    refreshList();
  });
}

function removeProjects(){
  var ids=document.getElementById('removeIds').value.split(',').map(function(s){return parseInt(s.trim());}).filter(function(n){return n>0;});
  if(!ids.length){document.getElementById('removeStatus').innerHTML='<div class="status err">Enter valid project IDs</div>';return;}
  fetch(API+'/api/primitives/vcu/admin/clearsky-project',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:PASSWORD,action:'remove',project_ids:ids})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.error){document.getElementById('removeStatus').innerHTML='<div class="status err">'+d.error+'</div>';return;}
    document.getElementById('removeStatus').innerHTML='<div class="status ok">Removed '+d.count+' projects</div>';
    document.getElementById('removeIds').value='';
    refreshList();
  });
}

function refreshList(){
  fetch(API+'/api/primitives/vcu/admin/clearsky-project',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:PASSWORD,action:'list'})
  })
  .then(function(r){return r.json();})
  .then(function(d){renderProjects(d.projects||[]);});
}

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
</script>
</body>
</html>
