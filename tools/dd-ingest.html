<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Intake — Bulk PDF Extraction</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg0:#030810;--bg1:#080f1e;--bg2:#0d1628;--bg3:#111d35;--bg4:#16243f;
  --border:rgba(99,130,191,0.12);--border-hi:rgba(99,130,191,0.22);
  --text0:#e8eef8;--text1:#b8c8e4;--text2:#7a94b8;--text3:#4a6080;
  --teal:#2dd4bf;--teal-dim:rgba(45,212,191,0.10);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.09);
  --green:#34d399;--green-dim:rgba(52,211,153,0.09);
  --red:#f87171;--red-dim:rgba(248,113,113,0.09);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg0);color:var(--text0);font-family:'DM Sans',sans-serif;font-size:13px}
body{display:flex;flex-direction:column;align-items:center;padding:32px 24px;overflow-y:auto}
.container{width:100%;max-width:960px}

h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text0);margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:24px}

/* Drop zone */
.dropzone{
  border:2px dashed var(--bg4);border-radius:12px;padding:48px 24px;
  text-align:center;cursor:pointer;transition:all .2s;background:var(--bg1);
  margin-bottom:24px;
}
.dropzone:hover,.dropzone.over{border-color:var(--teal);background:var(--teal-dim)}
.dropzone-icon{font-size:36px;margin-bottom:12px;opacity:0.5}
.dropzone-text{color:var(--text1);font-size:14px}
.dropzone-hint{color:var(--text3);font-size:11px;margin-top:8px}

/* Stats strip */
.stats{display:flex;gap:20px;margin-bottom:16px;font-size:12px;color:var(--text2)}
.stats .val{color:var(--teal);font-family:'DM Mono',monospace;font-weight:500}

/* File table */
.ftable{width:100%;border-collapse:collapse}
.ftable th{text-align:left;font-size:11px;color:var(--text3);padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.5px}
.ftable td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.ftable tr:hover td{background:var(--bg1)}

.fname{font-family:'DM Mono',monospace;font-size:12px;color:var(--text1);max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsize{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}
.fwords{font-family:'DM Mono',monospace;font-size:12px;color:var(--text1)}
.fmethod{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}

/* Status badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-queue{background:var(--blue-dim);color:var(--blue)}
.badge-proc{background:var(--amber-dim);color:var(--amber)}
.badge-done{background:var(--green-dim);color:var(--green)}
.badge-err{background:var(--red-dim);color:var(--red)}
.badge-skip{background:var(--bg3);color:var(--text3)}
.badge-warn{background:var(--amber-dim);color:var(--amber);font-size:10px;margin-left:6px}

/* Progress bar */
.pbar{width:80px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px}
.pbar-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .15s}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-teal{background:var(--teal);color:#030810}
.btn-teal:hover{opacity:0.85}
.btn-teal:disabled{opacity:0.3;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--teal);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--teal);background:var(--teal-dim)}

.actions-row{display:flex;gap:10px;align-items:center;margin-top:16px}

/* Hidden file input */
#fileInput{display:none}

/* Empty state */
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
</style>
</head>
<body>
<div class="container">
  <h1>DD Intake</h1>
  <div class="subtitle">Extract text from project documents &mdash; PDF &amp; ZIP supported, up to 60 files</div>

  <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
    <div class="dropzone-icon">&#128196;</div>
    <div class="dropzone-text">Drop PDFs or ZIP files here, or click to browse</div>
    <div class="dropzone-hint">ZIP files are extracted client-side. Only PDFs are sent for extraction.</div>
  </div>
  <input type="file" id="fileInput" multiple accept=".pdf,.zip">

  <div class="stats" id="stats" style="display:none">
    <span>Files: <span class="val" id="statFiles">0</span></span>
    <span>Done: <span class="val" id="statDone">0</span></span>
    <span>Words: <span class="val" id="statWords">0</span></span>
    <span>Errors: <span class="val" id="statErrors">0</span></span>
  </div>

  <table class="ftable" id="ftable" style="display:none">
    <thead>
      <tr><th>File</th><th>Size</th><th>Status</th><th>Words</th><th>Method</th><th></th></tr>
    </thead>
    <tbody id="ftbody"></tbody>
  </table>

  <div class="actions-row" id="actionsRow" style="display:none">
    <button class="btn btn-teal" id="btnDownloadAll" disabled onclick="downloadAllZip()">Download All (.zip)</button>
    <button class="btn btn-ghost" id="btnClear" onclick="clearAll()">Clear</button>
  </div>
</div>

<script>
const API = 'https://api-tools.oga.earth';
const POLL_MS = 5000;
const MAX_FILES = 60;

// State: fileId -> { filename, size, status, wordCount, text, method, error, pollTimer }
const jobs = {};
let fileCounter = 0;

// --- Helpers ---
function baseFilename(f) {
  return f.split('/').pop().split('\\').pop();
}
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function fmtNum(n) {
  return n != null ? n.toLocaleString() : '—';
}

// --- Drop zone ---
const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFiles(e.dataTransfer.files); });
fi.addEventListener('change', () => { handleFiles(fi.files); fi.value = ''; });

// --- Main pipeline ---
async function handleFiles(fileList) {
  const files = Array.from(fileList);
  const pdfs = [];

  for (const f of files) {
    const name = f.name.toLowerCase();
    if (name.endsWith('.zip')) {
      try {
        const zip = await JSZip.loadAsync(f);
        const entries = [];
        zip.forEach((path, entry) => {
          if (!entry.dir && path.toLowerCase().endsWith('.pdf')) entries.push({ path, entry });
        });
        for (const { path, entry } of entries) {
          const blob = await entry.async('blob');
          const pdfFile = new File([blob], baseFilename(path), { type: 'application/pdf' });
          pdfs.push(pdfFile);
        }
        if (entries.length === 0) addSkipped(f.name, 'ZIP contains no PDFs');
      } catch (err) {
        addSkipped(f.name, 'Failed to read ZIP: ' + err.message);
      }
    } else if (name.endsWith('.pdf')) {
      pdfs.push(f);
    } else {
      addSkipped(f.name, 'Not a PDF or ZIP');
    }
  }

  if (pdfs.length === 0) return;
  if (Object.keys(jobs).length + pdfs.length > MAX_FILES) {
    alert('Maximum ' + MAX_FILES + ' files. You have ' + Object.keys(jobs).length + ' + ' + pdfs.length + ' new.');
    return;
  }

  document.getElementById('ftable').style.display = '';
  document.getElementById('stats').style.display = '';
  document.getElementById('actionsRow').style.display = '';

  for (const pdf of pdfs) {
    uploadFile(pdf);
  }
}

function addSkipped(filename, reason) {
  const id = 'f' + (++fileCounter);
  jobs[id] = { filename: baseFilename(filename), size: 0, status: 'skipped', wordCount: 0, text: null, method: null, error: reason };
  document.getElementById('ftable').style.display = '';
  document.getElementById('stats').style.display = '';
  renderRow(id);
  updateStats();
}

async function uploadFile(file) {
  const id = 'f' + (++fileCounter);
  const fname = baseFilename(file.name);
  jobs[id] = { filename: fname, size: file.size, status: 'uploading', wordCount: 0, text: null, method: null, error: null };
  renderRow(id);
  updateStats();

  try {
    const form = new FormData();
    form.append('file', file, fname);

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 120000);

    const res = await fetch(API + '/api/primitives/extract', {
      method: 'POST',
      body: form,
      signal: ctrl.signal
    });
    clearTimeout(timer);

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || 'HTTP ' + res.status);
    }

    const data = await res.json();

    if (data.async) {
      // Async job — poll
      jobs[id].status = 'queued';
      jobs[id].jobId = data.job_id;
      renderRow(id);
      updateStats();
      pollJob(id, data.job_id);
    } else {
      // Sync result
      jobs[id].status = 'done';
      jobs[id].text = data.markdown || data.text || '';
      jobs[id].wordCount = data.word_count || 0;
      jobs[id].method = data.method || data.extraction_method || 'unknown';
      renderRow(id);
      updateStats();
    }
  } catch (err) {
    jobs[id].status = 'error';
    jobs[id].error = err.name === 'AbortError' ? 'Timeout (120s)' : err.message;
    renderRow(id);
    updateStats();
  }
}

function pollJob(id, jobId) {
  const doPoll = async () => {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 30000);
      const res = await fetch(API + '/api/primitives/jobs/' + jobId + '?text=1', { signal: ctrl.signal });
      clearTimeout(timer);

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      if (data.status === 'complete') {
        jobs[id].status = 'done';
        jobs[id].text = data.text || '';
        jobs[id].wordCount = data.word_count || 0;
        jobs[id].method = data.extraction_method || 'unknown';
        renderRow(id);
        updateStats();
        return; // stop polling
      } else if (data.status === 'error' || data.status === 'cancelled') {
        jobs[id].status = 'error';
        jobs[id].error = data.error || 'Extraction failed';
        renderRow(id);
        updateStats();
        return; // stop polling
      } else {
        // Still processing
        jobs[id].status = 'processing';
        jobs[id].progress = data.progress_pct;
        jobs[id].chunks = { done: data.completed_chunks || 0, total: data.total_chunks || 0 };
        renderRow(id);
        updateStats();
        jobs[id].pollTimer = setTimeout(doPoll, POLL_MS);
      }
    } catch (err) {
      // Retry on network error
      jobs[id].pollTimer = setTimeout(doPoll, POLL_MS * 2);
    }
  };
  jobs[id].pollTimer = setTimeout(doPoll, POLL_MS);
}

// --- Rendering ---
function renderRow(id) {
  const j = jobs[id];
  let tr = document.getElementById('row-' + id);
  if (!tr) {
    tr = document.createElement('tr');
    tr.id = 'row-' + id;
    document.getElementById('ftbody').appendChild(tr);
  }

  let statusHTML = '';
  if (j.status === 'uploading') statusHTML = '<span class="badge badge-queue">Uploading</span>';
  else if (j.status === 'queued') statusHTML = '<span class="badge badge-queue">Queued</span>';
  else if (j.status === 'processing') {
    const pct = j.progress || 0;
    const chunkTxt = j.chunks ? j.chunks.done + '/' + j.chunks.total : '';
    statusHTML = '<span class="badge badge-proc">Extracting' + (chunkTxt ? ' ' + chunkTxt : '') + '</span>'
      + '<div class="pbar"><div class="pbar-fill" style="width:' + pct + '%"></div></div>';
  }
  else if (j.status === 'done') {
    statusHTML = '<span class="badge badge-done">Done</span>';
    if (j.wordCount < 50) statusHTML += '<span class="badge badge-warn">Low extraction</span>';
  }
  else if (j.status === 'error') statusHTML = '<span class="badge badge-err" title="' + (j.error||'') + '">Error</span>';
  else if (j.status === 'skipped') statusHTML = '<span class="badge badge-skip" title="' + (j.error||'') + '">Skipped</span>';

  let actionsHTML = '';
  if (j.status === 'done' && j.text) {
    actionsHTML = '<button class="btn btn-sm btn-ghost" onclick="downloadTxt(\'' + id + '\')">Download .txt</button>';
  }

  tr.innerHTML =
    '<td class="fname" title="' + j.filename + '">' + j.filename + '</td>'
    + '<td class="fsize">' + (j.size ? fmtSize(j.size) : '—') + '</td>'
    + '<td>' + statusHTML + '</td>'
    + '<td class="fwords">' + (j.status === 'done' ? fmtNum(j.wordCount) : '—') + '</td>'
    + '<td class="fmethod">' + (j.method || '') + '</td>'
    + '<td>' + actionsHTML + '</td>';
}

function updateStats() {
  let total = 0, done = 0, words = 0, errors = 0;
  for (const id in jobs) {
    const j = jobs[id];
    if (j.status === 'skipped') continue;
    total++;
    if (j.status === 'done') { done++; words += j.wordCount || 0; }
    if (j.status === 'error') errors++;
  }
  document.getElementById('statFiles').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statWords').textContent = fmtNum(words);
  document.getElementById('statErrors').textContent = errors;

  const allFinished = total > 0 && (done + errors) === total;
  document.getElementById('btnDownloadAll').disabled = !(done > 0 && allFinished);
}

// --- Downloads ---
function downloadTxt(id) {
  const j = jobs[id];
  if (!j || !j.text) return;
  const name = j.filename.replace(/\.pdf$/i, '') + '.txt';
  const blob = new Blob([j.text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function downloadAllZip() {
  const btn = document.getElementById('btnDownloadAll');
  btn.disabled = true;
  btn.textContent = 'Building ZIP...';

  try {
    const zip = new JSZip();
    for (const id in jobs) {
      const j = jobs[id];
      if (j.status === 'done' && j.text) {
        const name = j.filename.replace(/\.pdf$/i, '') + '.txt';
        zip.file(name, j.text);
      }
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    const ts = new Date().toISOString().slice(0,10).replace(/-/g, '');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dd-extracted-' + ts + '.zip';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (err) {
    alert('ZIP generation failed: ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = 'Download All (.zip)';
}

function clearAll() {
  for (const id in jobs) {
    if (jobs[id].pollTimer) clearTimeout(jobs[id].pollTimer);
  }
  for (const k in jobs) delete jobs[k];
  document.getElementById('ftbody').innerHTML = '';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('actionsRow').style.display = 'none';
  document.getElementById('ftable').style.display = 'none';
  fileCounter = 0;
}
</script>
</body>
</html>
