<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearSky Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1B3E;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px}
.logo{color:#5B9BD5;font-size:28px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.subtitle{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:48px;text-align:center}
.primary-btn{display:block;background:#5B9BD5;color:#fff;text-decoration:none;
  font-size:16px;font-weight:600;padding:16px 48px;border-radius:8px;
  margin-bottom:40px;transition:background .2s}
.primary-btn:hover{background:#4a8bc4}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:520px;width:100%;
  margin-bottom:24px}
.tool-link{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.75);
  text-decoration:none;padding:12px 8px;border-radius:6px;font-size:12px;
  text-align:center;border:1px solid rgba(255,255,255,0.1);transition:all .2s}
.tool-link:hover{background:rgba(91,155,213,0.2);color:#fff;border-color:#5B9BD5}
.beta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  max-width:520px;width:100%;margin-bottom:32px}
.beta-link{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.35);
  text-decoration:none;padding:8px 6px;border-radius:5px;font-size:11px;
  text-align:center;border:1px solid rgba(255,255,255,0.06)}
.beta-link:hover{color:rgba(255,255,255,0.6)}
.section-label{color:rgba(255,255,255,0.25);font-size:10px;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;width:100%;max-width:520px}
footer{color:rgba(255,255,255,0.2);font-size:11px;margin-top:16px}
</style>
</head>
<body>
<div class="logo">CLEARSKY</div>
<div class="subtitle">Carbon Market Intelligence &middot; Internal Tools</div>
<a class="primary-btn" href="/tools/clearskyplatform.html">Open Platform &rarr;</a>
<div class="section-label">Quick access</div>
<div class="grid">
  <a class="tool-link" href="/tools/revenue.html">Revenue</a>
  <a class="tool-link" href="/tools/miteco.html">MITECO</a>
  <a class="tool-link" href="/tools/rfp-screener.html">RFP Screener</a>
  <a class="tool-link" href="/tools/dashboard.html">Dashboard</a>
  <a class="tool-link" href="/tools/presentations-v3.html">Presentations</a>
  <a class="tool-link" href="/tools/expense-report.html">Expenses</a>
</div>
<div class="section-label">Beta</div>
<div class="beta-grid">
  <a class="beta-link" href="/tools/projects.html">Projects</a>
  <a class="beta-link" href="/tools/file-librarian.html">File Librarian</a>
  <a class="beta-link" href="/tools/linkedin.html">LinkedIn</a>
  <a class="beta-link" href="/tools/onboarding.html">Onboarding</a>
</div>
<footer>ClearSky Carbono S.L. &middot; Internal use only</footer>
</body>
</html>
