<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verra VCS Registry — VCU Transaction Intelligence</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#030810; --bg1:#070F1E; --bg2:#0A1628; --bg3:#0E1F36;
  --bg4:#142744; --bg5:#1A3055;
  --border0:#0F1E30; --border1:#162C44; --border2:#1E3A58;
  --teal:#00D4AA; --teal2:#009E78; --teal-glow:rgba(0,212,170,.12); --teal-faint:rgba(0,212,170,.05);
  --amber:#F5A623; --amber-dim:rgba(245,166,35,.14);
  --red:#FF4757; --red-dim:rgba(255,71,87,.12);
  --green:#2ED573; --green-dim:rgba(46,213,115,.12);
  --blue:#5B9CF6; --blue-dim:rgba(91,156,246,.12);
  --violet:#A78BFA; --violet-dim:rgba(167,139,250,.12);
  --txt0:#D8E8F5; --txt1:#8AACCC; --txt2:#445E78; --txt3:#253344;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg0);color:var(--txt0);font-family:'DM Sans',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden}
.syne{font-family:'Syne',sans-serif}
.mono{font-family:'DM Mono',monospace}

/* Header */
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border0);background:var(--bg1);position:sticky;top:0;z-index:100}
#header .logo{display:flex;align-items:center;gap:10px}
#header h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;color:var(--txt0)}
#header h1 span{color:var(--teal);font-weight:800}
.header-right{display:flex;align-items:center;gap:12px}
.nav-link{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--border1);background:none;color:var(--txt1);border-radius:3px;cursor:pointer;transition:all .15s;text-decoration:none}
.nav-link:hover{background:var(--bg3);color:var(--txt0);border-color:var(--teal)}

/* Stats bar */
#stats-bar{display:flex;gap:16px;padding:10px 24px;border-bottom:1px solid var(--border0);background:var(--bg1);flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border0)}
.stat-pill .sp-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.stat-pill .sp-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt2)}
.stat-pill.issued .sp-val{color:var(--teal)}
.stat-pill.retired .sp-val{color:var(--green)}
.stat-pill.outstanding .sp-val{color:var(--amber)}

/* Tab bar */
#tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border0);background:var(--bg1);padding:0 24px;overflow-x:auto}
.tab-btn{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:10px 16px;border:none;background:none;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--txt1)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-btn .tab-count{font-family:'DM Mono',monospace;font-size:10px;margin-left:4px;opacity:.7}

/* Filter bar */
#filter-bar{display:flex;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border0);background:var(--bg1);align-items:center;flex-wrap:wrap}
#search-input{background:var(--bg3);border:1px solid var(--border1);color:var(--txt0);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 12px 7px 32px;border-radius:4px;outline:none;width:280px;transition:border-color .15s}
#search-input:focus{border-color:var(--teal)}
.search-wrap{position:relative}
.search-wrap .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt2);font-size:13px}
.filter-select{background:var(--bg3);border:1px solid var(--border1);color:var(--txt1);font-family:'DM Sans',sans-serif;font-size:11px;padding:7px 10px;border-radius:4px;outline:none;cursor:pointer;min-width:120px}
.filter-select:focus{border-color:var(--teal)}
#result-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--txt2);margin-left:auto}
.filter-toggle{font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:3px;border:1px solid var(--border1);background:var(--bg3);color:var(--txt2);cursor:pointer;transition:all .15s}
.filter-toggle.active{color:var(--teal);border-color:var(--teal);background:var(--teal-faint)}

/* Table */
#project-table-wrap{overflow-x:auto;padding:0 24px}
#project-table{width:100%;border-collapse:collapse;min-width:900px}
#project-table th{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2);text-align:left;padding:8px 8px;border-bottom:1px solid var(--border1);position:sticky;top:85px;background:var(--bg0);cursor:pointer;user-select:none;white-space:nowrap;z-index:10}
#project-table th:hover{color:var(--txt1)}
#project-table th .sort-arrow{margin-left:3px;font-size:8px;opacity:.5}
#project-table th.sorted .sort-arrow{opacity:1;color:var(--teal)}
#project-table td{font-size:12px;padding:6px 8px;border-bottom:1px solid var(--border0);color:var(--txt1);vertical-align:middle}
#project-table tr{cursor:pointer;transition:background .1s}
#project-table tr:hover td{background:var(--bg2)}
#project-table tr.selected td{background:var(--teal-faint)}
.pid-cell{font-family:'DM Mono',monospace;font-size:11px;color:var(--txt2);min-width:50px}
.name-cell{max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt0)}
.country-cell{white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.meth-cell{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Status badges */
.status-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.status-badge.R{color:var(--green);background:var(--green-dim)}
.status-badge.UD{color:var(--blue);background:var(--blue-dim)}
.status-badge.UV{color:var(--amber);background:var(--amber-dim)}
.status-badge.LV{color:var(--red);background:var(--red-dim)}
.status-badge.RR,.status-badge.VAR,.status-badge.RVAR{color:var(--violet);background:var(--violet-dim)}
.status-badge.W,.status-badge.REJ,.status-badge.I{color:var(--txt2);background:var(--bg3)}
.status-badge.OH{color:var(--amber);background:var(--amber-dim)}
.status-badge.UT{color:var(--teal);background:var(--teal-faint)}

/* VCU badge in table */
.vcu-badge{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:3px;color:var(--teal);background:var(--teal-faint);white-space:nowrap}
.vcu-badge.none{color:var(--txt3);background:transparent}

/* Detail Panel */
#detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(3,8,16,.6);z-index:200;display:none;opacity:0;transition:opacity .2s}
#detail-overlay.open{display:block;opacity:1}
#detail-panel{position:fixed;top:0;right:-460px;width:460px;height:100vh;background:var(--bg1);border-left:1px solid var(--border0);z-index:201;overflow-y:auto;transition:right .25s ease;box-shadow:-8px 0 30px rgba(0,0,0,.4)}
#detail-panel.open{right:0}
#detail-panel::-webkit-scrollbar{width:4px}
#detail-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Panel header */
.panel-header{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border0);position:sticky;top:0;background:var(--bg1);z-index:5}
.panel-header .ph-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--teal);margin-bottom:4px}
.panel-header .ph-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--txt0);line-height:1.3}
.panel-close{background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer;padding:4px;transition:color .15s}
.panel-close:hover{color:var(--txt0)}

/* Panel tabs */
.panel-tabs{display:flex;border-bottom:1px solid var(--border0);padding:0 20px;background:var(--bg1);position:sticky;top:60px;z-index:4}
.panel-tab{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 14px;border:none;background:none;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.panel-tab:hover{color:var(--txt1)}
.panel-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.panel-tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--teal);margin-left:5px;vertical-align:middle}

/* Panel content */
.panel-body{padding:20px}
.panel-section{display:none}
.panel-section.active{display:block}

/* Overview fields */
.ov-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border0)}
.ov-row:last-child{border-bottom:none}
.ov-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2);flex-shrink:0}
.ov-value{font-size:12px;color:var(--txt0);text-align:right;max-width:260px;word-break:break-word}
.verra-link{color:var(--teal);text-decoration:none;font-size:11px}
.verra-link:hover{text-decoration:underline}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.kpi-card{background:var(--bg2);border:1px solid var(--border0);border-radius:6px;padding:12px;text-align:center}
.kpi-card .kpi-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;margin-bottom:2px}
.kpi-card .kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--txt2)}
.kpi-card.issued .kpi-val{color:var(--teal)}
.kpi-card.retired .kpi-val{color:var(--green)}
.kpi-card.rate .kpi-val{color:var(--green)}
.kpi-card.rate.amber .kpi-val{color:var(--amber)}
.kpi-card.rate.red .kpi-val{color:var(--red)}
.kpi-card.vintage .kpi-val{color:var(--blue)}

/* Sparkline */
.spark-section{margin-bottom:20px}
.spark-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2);margin-bottom:10px}
.spark-chart{display:flex;align-items:flex-end;gap:4px;height:80px;padding:0 4px}
.spark-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.spark-bar{width:100%;border-radius:2px 2px 0 0;transition:height .3s;min-height:2px}
.spark-bar.old{background:var(--txt2)}
.spark-bar.recent{background:var(--teal)}
.spark-year{font-family:'DM Mono',monospace;font-size:8px;color:var(--txt2)}
.spark-val{font-family:'DM Mono',monospace;font-size:8px;color:var(--txt1);white-space:nowrap}

/* Retirement ring */
.ring-section{margin-bottom:20px;display:flex;align-items:center;gap:20px}
.ring-wrap{width:80px;height:80px;flex-shrink:0}
.ring-label{flex:1}
.ring-label .rl-pct{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;margin-bottom:2px}
.ring-label .rl-sub{font-size:11px;color:var(--txt2)}
.ring-label .rl-pct.green{color:var(--green)}
.ring-label .rl-pct.amber{color:var(--amber)}
.ring-label .rl-pct.red{color:var(--red)}

/* Buyer bars */
.buyer-section{margin-bottom:10px}
.buyer-row{margin-bottom:8px}
.buyer-name{font-size:11px;color:var(--txt1);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.buyer-bar-wrap{display:flex;align-items:center;gap:8px}
.buyer-bar{height:14px;border-radius:2px;background:var(--teal);transition:width .3s;min-width:4px}
.buyer-vol{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt2);white-space:nowrap}

/* No data state */
.no-vcu{text-align:center;padding:40px 20px;color:var(--txt2)}
.no-vcu .nv-icon{font-size:28px;margin-bottom:8px;opacity:.4}
.no-vcu .nv-text{font-size:12px}

/* Pagination */
#pagination{display:flex;justify-content:center;align-items:center;gap:8px;padding:16px 24px}
.page-btn{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border:1px solid var(--border1);background:var(--bg3);color:var(--txt1);border-radius:3px;cursor:pointer;transition:all .15s}
.page-btn:hover{border-color:var(--teal);color:var(--teal)}
.page-btn.active{background:var(--teal);color:var(--bg0);border-color:var(--teal)}
.page-btn:disabled{opacity:.3;cursor:default}
#page-info{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt2)}

/* Loading state */
.loading-msg{text-align:center;padding:60px;color:var(--txt2);font-size:13px}

/* Responsive */
@media(max-width:768px){
  #header{padding:10px 16px}
  #stats-bar{padding:8px 16px;gap:8px}
  .stat-pill .sp-val{font-size:12px}
  #tab-bar{padding:0 16px}
  #filter-bar{padding:10px 16px}
  #search-input{width:100%}
  #project-table-wrap{padding:0 8px}
  #detail-panel{width:100vw;right:-100vw}
}
</style>
</head>

// ===== STATE =====
let allProjects = [];
let filteredProjects = [];
let sortCol = 'id';
let sortDir = 'desc';
let activeStatusTab = null; // null = all
let selectedProjectId = null;
let activePanelTab = 'overview';
const PAGE_SIZE = 100;
let currentPage = 1;

// ===== INIT =====
function init() {
  // Merge PROJECTS tuples + VCU_DATA
  allProjects = PROJECTS.map(p => {
    const [id, name, country, meth, status, estAnnual, proponent] = p;
    const vcu = VCU_DATA[id] || null;
    return { id, name, country, meth, status, estAnnual, proponent, vcu };
  });

  // Populate stats
  document.getElementById('stat-issued').textContent = fmtN(VCU_MARKET.total_issued);
  document.getElementById('stat-retired').textContent = fmtN(VCU_MARKET.total_retired);
  document.getElementById('stat-outstanding').textContent = fmtN(VCU_MARKET.outstanding);

  // Build tabs
  buildTabs();

  // Build filter dropdowns
  buildFilters();

  // Bind events
  document.getElementById('search-input').addEventListener('input', debounce(applyFilters, 200));
  document.getElementById('filter-methodology').addEventListener('change', applyFilters);
  document.getElementById('filter-country').addEventListener('change', applyFilters);
  document.getElementById('filter-vcu').addEventListener('click', function() {
    this.classList.toggle('active');
    applyFilters();
  });

  // Table sort
  document.querySelectorAll('#project-table th[data-col]').forEach(th => {
    th.addEventListener('click', () => sortTable(th.dataset.col));
  });

  // Panel close
  document.getElementById('panel-close').addEventListener('click', closeDetail);
  document.getElementById('detail-overlay').addEventListener('click', closeDetail);

  // Panel tabs
  document.querySelectorAll('.panel-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activePanelTab = btn.dataset.ptab;
      document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
      document.getElementById('sec-' + activePanelTab).classList.add('active');
    });
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });

  // Initial render
  applyFilters();
}

// ===== FORMAT HELPERS =====
function fmtN(n) {
  if (n == null) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtComma(n) {
  if (n == null) return '—';
  return n.toLocaleString();
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ===== TABS =====
function buildTabs() {
  const bar = document.getElementById('tab-bar');
  // Count per status group
  const counts = {};
  STATUS_TABS.forEach(([codes]) => {
    if (codes === null) {
      counts['all'] = allProjects.length;
    } else {
      const arr = codes.split(',');
      counts[codes] = allProjects.filter(p => arr.includes(p.status)).length;
    }
  });

  bar.innerHTML = STATUS_TABS.map(([codes, label]) => {
    const key = codes === null ? 'all' : codes;
    const cnt = counts[key] || 0;
    const isActive = codes === activeStatusTab;
    return `<button class="tab-btn${isActive ? ' active' : ''}" data-status="${codes || ''}">${label} <span class="tab-count">${cnt}</span></button>`;
  }).join('');

  bar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.status;
      activeStatusTab = v === '' ? null : v;
      bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPage = 1;
      applyFilters();
    });
  });
}

// ===== FILTERS =====
function buildFilters() {
  // Methodology dropdown
  const meths = new Set();
  allProjects.forEach(p => { if (p.meth) p.meth.split(';').forEach(m => { const t = m.trim(); if (t) meths.add(t); }); });
  const methSorted = [...meths].sort();
  const methSel = document.getElementById('filter-methodology');
  methSorted.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    methSel.appendChild(opt);
  });

  // Country dropdown
  const countries = new Set();
  allProjects.forEach(p => { if (p.country) countries.add(p.country); });
  const countrySorted = [...countries].sort();
  const countrySel = document.getElementById('filter-country');
  countrySorted.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    countrySel.appendChild(opt);
  });
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const meth = document.getElementById('filter-methodology').value;
  const country = document.getElementById('filter-country').value;
  const vcuOnly = document.getElementById('filter-vcu').classList.contains('active');

  filteredProjects = allProjects.filter(p => {
    // Status tab
    if (activeStatusTab !== null) {
      const codes = activeStatusTab.split(',');
      if (!codes.includes(p.status)) return false;
    }

    // Search
    if (q) {
      const haystack = (p.id + ' ' + p.name + ' ' + p.country + ' ' + p.meth + ' ' + p.proponent).toLowerCase();
      if (!haystack.includes(q)) return false;
    }

    // Methodology
    if (meth && (!p.meth || !p.meth.includes(meth))) return false;

    // Country
    if (country && p.country !== country) return false;

    // VCU data only
    if (vcuOnly && !p.vcu) return false;

    return true;
  });

  // Sort
  doSort();

  document.getElementById('result-count').textContent = fmtComma(filteredProjects.length) + ' projects';
  renderTable();
}

// ===== SORT =====
function sortTable(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = col === 'name' || col === 'country' || col === 'meth' ? 'asc' : 'desc';
  }

  // Update header UI
  document.querySelectorAll('#project-table th').forEach(th => {
    th.classList.remove('sorted');
    th.querySelector('.sort-arrow').innerHTML = '&#9660;';
  });
  const activeTh = document.querySelector(`#project-table th[data-col="${col}"]`);
  if (activeTh) {
    activeTh.classList.add('sorted');
    activeTh.querySelector('.sort-arrow').innerHTML = sortDir === 'asc' ? '&#9650;' : '&#9660;';
  }

  currentPage = 1;
  doSort();
  renderTable();
}

function doSort() {
  const dir = sortDir === 'asc' ? 1 : -1;
  filteredProjects.sort((a, b) => {
    let va, vb;
    switch (sortCol) {
      case 'id':
        va = parseInt(a.id) || 0; vb = parseInt(b.id) || 0;
        return (va - vb) * dir;
      case 'name':
        return (a.name || '').localeCompare(b.name || '') * dir;
      case 'country':
        return (a.country || '').localeCompare(b.country || '') * dir;
      case 'meth':
        return (a.meth || '').localeCompare(b.meth || '') * dir;
      case 'status':
        return (a.status || '').localeCompare(b.status || '') * dir;
      case 'vcus':
        va = a.vcu ? a.vcu.ti : 0; vb = b.vcu ? b.vcu.ti : 0;
        return (va - vb) * dir;
      default:
        return 0;
    }
  });
}

// ===== RENDER TABLE =====
function renderTable() {
  const tbody = document.getElementById('project-tbody');
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredProjects.slice(start, start + PAGE_SIZE);

  if (page.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--txt2)">No projects match filters</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = page.map(p => {
    const vcuCell = p.vcu
      ? `<span class="vcu-badge">${fmtN(p.vcu.ti)}</span>`
      : `<span class="vcu-badge none">—</span>`;
    const sel = p.id === selectedProjectId ? ' selected' : '';
    return `<tr data-id="${p.id}" class="${sel}" onclick="openDetail('${p.id}')">
      <td class="pid-cell">${p.id}</td>
      <td class="name-cell" title="${esc(p.name)}">${esc(p.name)}</td>
      <td class="country-cell" title="${esc(p.country)}">${esc(p.country)}</td>
      <td class="meth-cell" title="${esc(p.meth)}">${esc(p.meth)}</td>
      <td><span class="status-badge ${p.status}">${STATUS_LABELS[p.status] || p.status}</span></td>
      <td>${vcuCell}</td>
    </tr>`;
  }).join('');

  renderPagination();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== PAGINATION =====
function renderPagination() {
  const totalPages = Math.ceil(filteredProjects.length / PAGE_SIZE);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  const pag = document.getElementById('pagination');
  let html = '';

  html += `<button class="page-btn" ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage-1})">&laquo;</button>`;

  // Show pages around current
  const start = Math.max(1, currentPage - 3);
  const end = Math.min(totalPages, currentPage + 3);
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>`;
  if (start > 2) html += `<span id="page-info">...</span>`;

  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  if (end < totalPages - 1) html += `<span id="page-info">...</span>`;
  if (end < totalPages) html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;

  html += `<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage+1})">&raquo;</button>`;
  html += `<span id="page-info">${(currentPage-1)*PAGE_SIZE+1}-${Math.min(currentPage*PAGE_SIZE, filteredProjects.length)} of ${fmtComma(filteredProjects.length)}</span>`;

  pag.innerHTML = html;
}

function goPage(n) {
  const totalPages = Math.ceil(filteredProjects.length / PAGE_SIZE);
  if (n < 1 || n > totalPages) return;
  currentPage = n;
  renderTable();
  document.getElementById('project-table-wrap').scrollTo(0, 0);
}

// ===== DETAIL PANEL =====
function openDetail(id) {
  const p = allProjects.find(x => x.id === id || x.id === String(id));
  if (!p) return;

  selectedProjectId = p.id;

  // Highlight row
  document.querySelectorAll('#project-table tr.selected').forEach(r => r.classList.remove('selected'));
  const row = document.querySelector(`#project-table tr[data-id="${p.id}"]`);
  if (row) row.classList.add('selected');

  // Header
  document.getElementById('ph-id').textContent = 'VCS-' + p.id;
  document.getElementById('ph-name').textContent = p.name;

  // VCU dot indicator
  document.getElementById('vcu-dot').style.display = p.vcu ? 'inline-block' : 'none';

  // Overview tab
  renderOverview(p);

  // VCU tab
  renderVCU(p);

  // Reset to overview tab
  activePanelTab = 'overview';
  document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
  document.querySelector('.panel-tab[data-ptab="overview"]').classList.add('active');
  document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-overview').classList.add('active');

  // If project has VCU data, auto-switch to VCU tab
  if (p.vcu) {
    activePanelTab = 'vcu';
    document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
    document.querySelector('.panel-tab[data-ptab="vcu"]').classList.add('active');
    document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-vcu').classList.add('active');
  }

  // Open panel
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-panel').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  selectedProjectId = null;
  document.querySelectorAll('#project-table tr.selected').forEach(r => r.classList.remove('selected'));
}

function renderOverview(p) {
  const sec = document.getElementById('sec-overview');
  const fields = [
    ['Project ID', p.id],
    ['Name', p.name],
    ['Status', STATUS_LABELS[p.status] || p.status],
    ['Country', p.country],
    ['Methodology', p.meth],
    ['Proponent', p.proponent],
    ['Est. Annual Reductions', p.estAnnual ? fmtComma(p.estAnnual) + ' tCO2e' : '—'],
  ];

  sec.innerHTML = fields.map(([label, val]) =>
    `<div class="ov-row"><span class="ov-label">${label}</span><span class="ov-value">${esc(String(val || '—'))}</span></div>`
  ).join('') +
  `<div style="margin-top:16px;text-align:center">
    <a href="https://registry.verra.org/app/projectDetail/VCS/${p.id}" target="_blank" class="verra-link">View on Verra Registry &rarr;</a>
  </div>`;
}

function renderVCU(p) {
  const sec = document.getElementById('sec-vcu');

  if (!p.vcu) {
    sec.innerHTML = `<div class="no-vcu">
      <div class="nv-icon">&#9678;</div>
      <div class="nv-text">No VCU transaction data available for this project</div>
    </div>`;
    return;
  }

  const v = p.vcu;
  const rateClass = v.rr >= 70 ? '' : v.rr >= 40 ? ' amber' : ' red';
  const rateColorClass = v.rr >= 70 ? 'green' : v.rr >= 40 ? 'amber' : 'red';

  // KPI cards
  let html = `<div class="kpi-grid">
    <div class="kpi-card issued">
      <div class="kpi-val">${fmtN(v.ti)}</div>
      <div class="kpi-label">Total Issued</div>
    </div>
    <div class="kpi-card retired">
      <div class="kpi-val">${fmtN(v.tr)}</div>
      <div class="kpi-label">Total Retired</div>
    </div>
    <div class="kpi-card rate${rateClass}">
      <div class="kpi-val">${v.rr}%</div>
      <div class="kpi-label">Retirement Rate</div>
    </div>
    <div class="kpi-card vintage">
      <div class="kpi-val">${v.vp}%</div>
      <div class="kpi-label">Vintage 2022+</div>
    </div>
  </div>`;

  // Sparkline: issuance by year (2019-2026)
  const years = [2019,2020,2021,2022,2023,2024,2025,2026];
  const maxIy = Math.max(...v.iy, 1);
  html += `<div class="spark-section">
    <div class="spark-title">Issuance by Vintage Year</div>
    <div class="spark-chart">
      ${v.iy.map((qty, i) => {
        const h = Math.max((qty / maxIy) * 70, 2);
        const cls = years[i] >= 2022 ? 'recent' : 'old';
        const valLabel = qty > 0 ? fmtN(qty) : '';
        return `<div class="spark-bar-wrap">
          <span class="spark-val">${valLabel}</span>
          <div class="spark-bar ${cls}" style="height:${h}px" title="${fmtComma(qty)} VCUs"></div>
          <span class="spark-year">${String(years[i]).slice(2)}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // Retirement rate ring
  const circumference = 2 * Math.PI * 34;
  const dashLen = (v.rr / 100) * circumference;
  const ringColor = v.rr >= 70 ? 'var(--green)' : v.rr >= 40 ? 'var(--amber)' : 'var(--red)';
  html += `<div class="ring-section">
    <div class="ring-wrap">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34" fill="none" stroke="var(--bg3)" stroke-width="6"/>
        <circle cx="40" cy="40" r="34" fill="none" stroke="${ringColor}" stroke-width="6"
          stroke-dasharray="${dashLen} ${circumference}" stroke-dashoffset="0"
          transform="rotate(-90 40 40)" stroke-linecap="round"/>
        <text x="40" y="44" text-anchor="middle" fill="var(--txt0)" font-family="DM Mono" font-size="14" font-weight="500">${v.rr}%</text>
      </svg>
    </div>
    <div class="ring-label">
      <div class="rl-pct ${rateColorClass}">${fmtComma(v.tr)}</div>
      <div class="rl-sub">of ${fmtComma(v.ti)} VCUs retired</div>
    </div>
  </div>`;

  // Top buyers
  if (v.tb && v.tb.length > 0) {
    const maxBuyer = v.tb[0][1] || 1;
    html += `<div class="buyer-section">
      <div class="spark-title">Top Buyers</div>
      ${v.tb.map(([name, qty]) => {
        const w = Math.max((qty / maxBuyer) * 100, 4);
        return `<div class="buyer-row">
          <div class="buyer-name" title="${esc(name)}">${esc(name)}</div>
          <div class="buyer-bar-wrap">
            <div class="buyer-bar" style="width:${w}%"></div>
            <span class="buyer-vol">${fmtN(qty)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Active years
  html += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border0)">
    <div class="ov-row"><span class="ov-label">First Issuance Year</span><span class="ov-value mono">${v.fy || '—'}</span></div>
    <div class="ov-row"><span class="ov-label">Last Issuance Year</span><span class="ov-value mono">${v.ly || '—'}</span></div>
  </div>`;

  sec.innerHTML = html;
}
